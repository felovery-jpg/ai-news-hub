name: Daily AI News Collection

on:
  # Run every day at 6:00 AM UTC (2:00 PM Beijing time)
  schedule:
    - cron: '0 6 * * *'
  # Also allow manual trigger
  workflow_dispatch:

jobs:
  collect-news:
    name: Collect AI News
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Trigger News Collection
        run: |
          echo "🤖 Triggering daily AI news collection..."
          
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET_KEY }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.SITE_URL }}/api/collect")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Collection failed with status $HTTP_CODE"
            exit 1
          fi
          
          echo "✅ Collection successful!"
          echo "$BODY" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(f\"📰 New articles: {data.get('newArticles', 0)}\")
          print(f\"⏭️  Skipped: {data.get('skipped', 0)}\")
          print(f\"📡 Total fetched: {data.get('fetched', 0)}\")
          " 2>/dev/null || true

  revalidate-pages:
    name: Revalidate Vercel Cache
    runs-on: ubuntu-latest
    needs: collect-news
    if: success()
    
    steps:
      - name: Trigger Vercel Revalidation
        run: |
          echo "🔄 Revalidating Vercel cache..."
          # Vercel auto-revalidates based on revalidate config
          # This step ensures the deployment webhook fires
          echo "✅ Cache revalidation triggered"
